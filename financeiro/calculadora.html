<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Workloop - Financeiro</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Arial,sans-serif; }
  body { background:#0f0c29; color:#fff; padding:30px; display:flex; justify-content:center; }
  .container { max-width:700px; width:100%; }
  h1 { font-size:28px; margin-bottom:5px; background: linear-gradient(135deg,#667eea,#f093fb); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .sub { color:rgba(255,255,255,0.5); margin-bottom:30px; font-size:14px; }
  .card { background:rgba(255,255,255,0.07); border-radius:16px; padding:20px; margin-bottom:16px; border:1px solid rgba(255,255,255,0.1); }
  .card h2 { font-size:16px; margin-bottom:15px; color:#a78bfa; text-transform:uppercase; letter-spacing:1px; }
  .row { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
  .row:last-child { border-bottom:none; }
  .row label { font-size:14px; color:rgba(255,255,255,0.8); }
  .row input { width:120px; padding:6px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); color:#fff; font-size:14px; text-align:right; }
  .row input:focus { outline:2px solid #667eea; }
  .total { font-size:16px; font-weight:700; color:#fff; }
  .total label { color:#fff; font-weight:700; }
  .total input { background:rgba(102,126,234,0.3); font-weight:700; }
  .lucro { font-size:24px; text-align:center; padding:20px; }
  .lucro .valor { font-size:36px; font-weight:900; }
  .lucro .verde { color:#4ade80; }
  .lucro .vermelho { color:#f87171; }
  .meta { background:rgba(251,191,36,0.1); border:1px solid rgba(251,191,36,0.3); }
  .barra { height:8px; background:rgba(255,255,255,0.1); border-radius:4px; margin-top:10px; overflow:hidden; }
  .barra-preenchida { height:100%; background:linear-gradient(90deg,#667eea,#f093fb); border-radius:4px; transition:width 0.5s; }
  .clientes-input textarea { width:100%; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); color:#fff; font-size:13px; min-height:60px; resize:vertical; font-family:monospace; }
  .clientes-input textarea:focus { outline:2px solid #667eea; }
  .dicas { font-size:12px; color:rgba(255,255,255,0.4); margin-top:10px; }
</style>
</head>
<body>
<div class="container">
  <h1>📊 Workloop Financeiro</h1>
  <div class="sub">Preencha os valores → calcula automático</div>

  <!-- CUSTOS -->
  <div class="card">
    <h2>📉 Custos Fixos (mês)</h2>
    <div id="custos"></div>
  </div>

  <!-- RECEITAS -->
  <div class="card">
    <h2>📈 Receitas (mês)</h2>
    <div class="clientes-input">
      <textarea id="clientesText" placeholder="Digite os clientes, um por linha. Ex:&#10;Clínica Estética 97&#10;Padaria 49&#10;Mercado 97">Clínica Estética 0</textarea>
    </div>
    <div style="margin-top:12px" id="receitasDetalhe"></div>
  </div>

  <!-- RESUMO -->
  <div class="card meta">
    <div class="lucro">
      <div style="font-size:14px;color:rgba(255,255,255,0.6);margin-bottom:5px;">📈 Resultado do Mês</div>
      <div class="valor" id="resultado">R$ 0</div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;text-align:center;">
      <div><div style="font-size:12px;color:rgba(255,255,255,0.5)">Receita</div><div id="receitaTotal" style="font-size:20px;font-weight:700;color:#4ade80;">R$ 0</div></div>
      <div><div style="font-size:12px;color:rgba(255,255,255,0.5)">Custo</div><div id="custoTotal" style="font-size:20px;font-weight:700;color:#f87171;">R$ 0</div></div>
    </div>
    <div style="margin-top:15px;">
      <div style="display:flex;justify-content:space-between;font-size:13px;">
        <span style="color:rgba(255,255,255,0.5)">Meta: R$ 500/mês</span>
        <span id="percentualMeta" style="color:rgba(255,255,255,0.7)">0%</span>
      </div>
      <div class="barra"><div class="barra-preenchida" id="barraMeta" style="width:0%"></div></div>
    </div>
  </div>

  <!-- PREÇOS -->
  <div class="card">
    <h2>💵 Tabela de Preços</h2>
    <div class="row"><label>🟢 Básico (WhatsApp + Database)</label><span style="font-weight:700;color:#4ade80;">R$ 49</span></div>
    <div class="row"><label>🔵 Profissional (+ Instagram + n8n)</label><span style="font-weight:700;color:#60a5fa;">R$ 97</span></div>
    <div class="row"><label>🟣 Premium (Tudo)</label><span style="font-weight:700;color:#a78bfa;">R$ 147</span></div>
  </div>

  <div class="dicas">💡 Edita os valores ao lado → resultado atualiza na hora!</div>
</div>

<script>
const CUSTOS_ITENS = [
  {id:'vps', label:'☁️ VPS'},
  {id:'tailscale', label:'🔗 Tailscale'},
  {id:'deepseek', label:'🤖 DeepSeek API'},
  {id:'evolution', label:'📱 Evolution API'},
  {id:'supabase', label:'🗄️ Supabase'},
  {id:'replicate', label:'🎨 Replicate (FLUX)'},
  {id:'capcut', label:'🖼️ CapCut'},
  {id:'instagram', label:'📸 Instagram'},
  {id:'dominio', label:'🌐 Domínio'},
  {id:'outros', label:'📦 Outros'}
];

function criarInputs() {
  const div = document.getElementById('custos');
  CUSTOS_ITENS.forEach(item => {
    const r = document.createElement('div');
    r.className = 'row';
    r.innerHTML = `<label>${item.label}</label><input type="number" min="0" step="1" id="${item.id}" value="0" oninput="calcular()">`;
    div.appendChild(r);
  });
  const r = document.createElement('div');
  r.className = 'row total';
  r.innerHTML = '<label>TOTAL</label><input type="text" id="custoTotalInput" value="R$ 0" disabled>';
  div.appendChild(r);
}

function calcular() {
  // CUSTOS
  let custo = 0;
  CUSTOS_ITENS.forEach(item => {
    custo += parseFloat(document.getElementById(item.id).value) || 0;
  });
  document.getElementById('custoTotalInput').value = `R$ ${custo}`;
  document.getElementById('custoTotal').textContent = `R$ ${custo}`;

  // RECEITAS
  const texto = document.getElementById('clientesText').value;
  const linhas = texto.split('\n').filter(l => l.trim());
  const receitas = [];
  linhas.forEach(linha => {
    const partes = linha.trim().split(/\s+/);
    const valor = parseFloat(partes[partes.length-1]) || 0;
    const nome = partes.slice(0,-1).join(' ') || 'Cliente';
    receitas.push({nome, valor});
  });
  let receita = receitas.reduce((acc, r) => acc + r.valor, 0);
  document.getElementById('receitaTotal').textContent = `R$ ${receita}`;

  // DETALHE RECEITAS
  const detalhe = document.getElementById('receitasDetalhe');
  detalhe.innerHTML = receitas.map(r =>
    `<div class="row"><label>${r.nome}</label><span style="font-weight:500;color:#4ade80;">R$ ${r.valor}</span></div>`
  ).join('') + `<div class="row total"><label>TOTAL</label><input type="text" value="R$ ${receita}" disabled></div>`;

  // RESULTADO
  const lucro = receita - custo;
  const el = document.getElementById('resultado');
  el.textContent = `R$ ${lucro}`;
  el.className = 'valor ' + (lucro >= 0 ? 'verde' : 'vermelho');

  // META
  const meta = 500;
  const pct = Math.min(100, Math.max(0, (receita / meta) * 100));
  document.getElementById('percentualMeta').textContent = `${Math.round(pct)}%`;
  document.getElementById('barraMeta').style.width = `${pct}%`;
}

criarInputs();
calcular();
</script>
</body>
</html>
